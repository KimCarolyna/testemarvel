<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz Marvel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="inicio">
  <h1>Descubra seu herói da Marvel</h1>
  <p>Responda o quiz e veja qual personagem você seria!</p>
  <button onclick="iniciarQuiz()">Começar</button>
</div>

<div id="quiz" style="display:none;">
  <h2 id="pergunta"></h2>
  <div id="opcoes"></div>
</div>

<div id="resultado" style="display:none;">
  <h2 id="personagemNome"></h2>
  <p id="descricao"></p>
  <img id="imagem" width="200">
  <button onclick="reiniciar()">Refazer</button>
</div>

<div id="barra-container">
  <div id="barra"></div>
</div>

<script src="script.js"></script>
</body>
</html>
