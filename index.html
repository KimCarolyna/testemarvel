<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz Marvel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="inicio">
  <h1>Qual herói da Marvel combina com sua personalidade?</h1>
  <p>
    No universo Marvel, cada herói possui qualidades únicas.
    Responda às perguntas e descubra qual personagem mais combina com você.
  </p>
  <button onclick="iniciarQuiz()">Começar Quiz</button>
</div>

<div id="quiz" style="display:none;">
  <h2 id="pergunta"></h2>
  <div id="opcoes"></div>
</div>

<div id="resultado" style="display:none;">
  <h2 id="personagemNome"></h2>
  <p id="pontuacao"></p>
  <p id="descricao"></p>
  <img id="imagem" width="220">
  <button onclick="reiniciar()">Refazer Quiz</button>
</div>

<div id="barra-container" style="display:none;">
  <div id="barra"></div>
</div>

<script src="script.js"></script>
</body>
</html>
